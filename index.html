<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Collision Fix</title>

    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="./aframe-ar-main/dist/aframe-ar.min.js"></script>
</head>
<body>

<script>
function showMessage(message){
    let hud = document.querySelector("#hud");
    if(hud){
        hud.setAttribute('value', message); // FIXED
    }
}

AFRAME.registerComponent('ar-logic',{
    init: function(){
        showMessage('ar-logic is running..');
    },

    tick: function(){
        let cam = document.querySelector("#cam"); // FIXED
        if(!cam || !cam.components.raycaster){
            return;
        }

        let circle = document.querySelector("#circle");
        let intersection = cam.components.raycaster.getIntersection(circle);

        if(!intersection){
            return;
        }

        showMessage(
            'Collision Detected!! ' +
            intersection.point.x.toFixed(2) + " " +
            intersection.point.z.toFixed(2)
        );

        circle.setAttribute('position', intersection.point);
    }
});

window.addEventListener('touchstart', function(){
    let box = document.querySelector("#box");
    let circle = document.querySelector("#circle");

    let pos = circle.getAttribute('position');
    box.setAttribute('position', pos);
});
</script>

<a-scene ar ar-logic>

    <!-- FIXED RAYCASTER -->
    <a-camera id="cam" 
        raycaster="objects: #circle"
        cursor="rayOrigin: mouse">

        <a-text id="hud"
            value="Computer"
            position="0 -0.1 -0.25"
            align="center">
        </a-text>

    </a-camera>

    <a-ring id="circle"
        rotation="-90 0 0"
        inner-radius="0.01"
        outer-radius="0.02">
    </a-ring>

    <a-gltf-model id="box"
        src="desktop_computer.glb"
        scale="1 1 1"
        position="0 0 0">
    </a-gltf-model>

</a-scene>

</body>
</html>
